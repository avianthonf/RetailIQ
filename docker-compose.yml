services:
  app:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    env_file:
      - .env.example
    environment:
      - FLASK_APP=wsgi.py
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://retailiq:retailiq@postgres:5432/retailiq
      - CELERY_BROKER_URL=redis://redis:6379/1
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command:
      - sh
      - -c
      - python scripts/wait_for_db.py && alembic upgrade head && exec gunicorn --bind 0.0.0.0:5000 wsgi:app

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: retailiq
      POSTGRES_PASSWORD: retailiq
      POSTGRES_DB: retailiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retailiq -d retailiq"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  worker:
    build: .
    volumes:
      - .:/app
    env_file:
      - .env.example
    environment:
      - DATABASE_URL=postgresql://retailiq:retailiq@postgres:5432/retailiq
      - CELERY_BROKER_URL=redis://redis:6379/1
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A celery_worker.celery_app worker -l info --uid nobody --gid nogroup

  beat:
    build: .
    volumes:
      - .:/app
    env_file:
      - .env.example
    environment:
      - DATABASE_URL=postgresql://retailiq:retailiq@postgres:5432/retailiq
      - CELERY_BROKER_URL=redis://redis:6379/1
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A celery_worker.celery_app beat -l info --uid nobody --gid nogroup --schedule /tmp/celerybeat-schedule

volumes:
  postgres_data:

services:
  app:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command:
      - sh
      - -c
      - python scripts/wait_for_db.py && alembic upgrade head && exec gunicorn --bind 0.0.0.0:5000 wsgi:app

  postgres:
    image: postgres:15
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retailiq} -d ${POSTGRES_DB:-retailiq}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  worker:
    build: .
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A celery_worker.celery_app worker -l info --uid nobody --gid nogroup

  beat:
    build: .
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A celery_worker.celery_app beat -l info --uid nobody --gid nogroup --schedule /tmp/celerybeat-schedule

volumes:
  postgres_data:

# ============================================================================
# RetailIQ — Deploy to Render (Blueprint driven, <5 min GitHub runtime)
# ============================================================================
# Triggers on push to main or manual dispatch.
# Kicks off a Render blueprint deploy (render.yaml) so Render builds the
# latest commit and rolls it out to the api + worker services.
#
# Required GitHub Secrets:
#   RENDER_API_KEY         — Render API token with Blueprint + Service access
#   RENDER_BLUEPRINT_ID    — Blueprint identifier (bp-xxxxx)
#
# Optional GitHub Secrets:
#   RENDER_NOTIFY_WEBHOOK  — Slack/Teams webhook for deploy pings
# ============================================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      clear_cache:
        description: 'Force Render to rebuild without cached layers'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-render-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  RENDER_API_BASE: https://api.render.com/v1

jobs:
  deploy:
    name: 🚀 Render Blueprint Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      RENDER_NOTIFY_WEBHOOK: ${{ secrets.RENDER_NOTIFY_WEBHOOK || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_BLUEPRINT_ID: ${{ secrets.RENDER_BLUEPRINT_ID }}
        run: |
          set -euo pipefail
          missing=0
          for var in RENDER_API_KEY RENDER_BLUEPRINT_ID; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing required secret: ${var}" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Trigger Render blueprint deploy
        id: trigger
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_BLUEPRINT_ID: ${{ secrets.RENDER_BLUEPRINT_ID }}
          RENDER_API_BASE: ${{ env.RENDER_API_BASE }}
          CLEAR_CACHE_FLAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.clear_cache || 'false' }}
        run: |
          set -euo pipefail
          payload=$(jq -n --arg clear "$CLEAR_CACHE_FLAG" '{clearCache: ($clear == "true")}')
          tmp_response=$(mktemp)
          http_status=$(curl -sS -o "$tmp_response" -w "%{http_code}" -X POST "${RENDER_API_BASE}/blueprints/${RENDER_BLUEPRINT_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$payload")

          cat "$tmp_response"
          echo "\nHTTP status: $http_status"

          if [[ "$http_status" -ge 400 ]]; then
            echo "::error::Render API call failed. Verify RENDER_BLUEPRINT_ID and API token permissions." >&2
            exit 1
          fi

          response=$(cat "$tmp_response")
          deploy_id=$(echo "$response" | jq -r '.id // empty')
          status=$(echo "$response" | jq -r '.status // "unknown"')

          if [ -z "$deploy_id" ]; then
            echo "::error::Render API did not return a deploy id" >&2
            exit 1
          fi

          echo "deploy_id=$deploy_id" >> "$GITHUB_OUTPUT"
          echo "deploy_status=$status" >> "$GITHUB_OUTPUT"

      - name: Post Render deploy link
        if: always()
        env:
          RENDER_BLUEPRINT_ID: ${{ secrets.RENDER_BLUEPRINT_ID }}
          DEPLOY_ID: ${{ steps.trigger.outputs.deploy_id }}
        run: |
          echo "Render Blueprint: https://dashboard.render.com/blueprints/${RENDER_BLUEPRINT_ID}"
          if [ -n "${DEPLOY_ID}" ]; then
            echo "Deploy details: https://dashboard.render.com/blueprints/${RENDER_BLUEPRINT_ID}/deploys/${DEPLOY_ID}"
          fi

      - name: Notify webhook (optional)
        if: success() && env.RENDER_NOTIFY_WEBHOOK != ''
        env:
          WEBHOOK_URL: ${{ env.RENDER_NOTIFY_WEBHOOK }}
          DEPLOY_ID: ${{ steps.trigger.outputs.deploy_id }}
          DEPLOY_STATUS: ${{ steps.trigger.outputs.deploy_status }}
        run: |
          set -euo pipefail
          curl -sS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
                  --arg status "${DEPLOY_STATUS}" \
                  --arg deploy "${DEPLOY_ID}" \
                  --arg ref "${GITHUB_REF}" \
                  --arg sha "${GITHUB_SHA}" \
                  '{text: "RetailIQ Render deploy triggered", status: $status, deploy_id: $deploy, ref: $ref, sha: $sha})"

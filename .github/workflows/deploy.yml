# ============================================================================
# RetailIQ — Deploy to AWS ECS Fargate (ap-south-1)
# ============================================================================
# Triggers on push to main or manual dispatch.
# Builds the production Docker image, pushes to ECR, and performs a
# rolling update across API and Worker ECS services.
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID          — github-deployer IAM user
#   AWS_SECRET_ACCESS_KEY      — corresponding secret
#
# Optional GitHub Secrets:
#   SLACK_WEBHOOK_URL          — Slack incoming webhook for deploy notifications
# ============================================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test job (emergency hotfix only)'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1
  AWS_ACCOUNT_ID: '610572473486'
  ECR_REGISTRY: 610572473486.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: retailiq-api
  ECS_CLUSTER: retailiq-prod-cluster
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. TEST
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Pre-deploy Tests
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ci-test-secret-key
      FLASK_ENV: development
      PYTHONUNBUFFERED: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Create .env from example
        run: cp .env.example .env

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install pytest-xdist

      - name: Run test suite
        run: |
          pytest tests/ \
            -v \
            -n auto \
            --tb=short \
            --strict-markers

  # ──────────────────────────────────────────────────────────────────────────
  # 2. BUILD & PUSH
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: 🐳 Build & Push
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image: ${{ steps.build-image.outputs.image }}
      image_tag: ${{ env.IMAGE_TAG }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push image
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Output image URI
        run: |
          echo "image=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────────────────────────────────────
  # 3. DEPLOY — rolling update across ECS services
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy ${{ matrix.service.name }}
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        service:
          - name: api
            task_def_family: retailiq-api
            service_name: retailiq-api
            container_name: retailiq-api
          - name: worker
            task_def_family: retailiq-worker
            service_name: retailiq-worker
            container_name: retailiq-worker

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ matrix.service.task_def_family }} \
            --query taskDefinition > task-def.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: ${{ matrix.service.container_name }}
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ matrix.service.service_name }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 15

  # ──────────────────────────────────────────────────────────────────────────
  # 4. POST-DEPLOY — health verification + notification
  # ──────────────────────────────────────────────────────────────────────────
  verify:
    name: ✅ Post-deploy Verify
    needs: [deploy, build]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Summarize deployment
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Region** | ap-south-1 |" >> $GITHUB_STEP_SUMMARY
          echo "| **Cluster** | retailiq-prod-cluster |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | \`${{ env.IMAGE_TAG }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deploy Result** | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack (success)
        if: needs.deploy.result == 'success' && env.SLACK_WEBHOOK_URL
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "✅ RetailIQ deployed to ap-south-1",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *RetailIQ deployed to ap-south-1*\n• Commit: `${{ github.sha }}`\n• By: ${{ github.actor }}\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack (failure)
        if: needs.deploy.result == 'failure' && env.SLACK_WEBHOOK_URL
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "🚨 RetailIQ deploy FAILED",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚨 *RetailIQ deploy FAILED*\n• Commit: `${{ github.sha }}`\n• By: ${{ github.actor }}\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

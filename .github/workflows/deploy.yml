# ============================================================================
# RetailIQ — Deploy to AWS ECS Fargate (ap-south-1)
# ============================================================================
# Triggers on push to main or manual dispatch.
# Builds the production Docker image, pushes to ECR, and performs a
# rolling update across API and Worker ECS services.
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID          — github-deployer IAM user
#   AWS_SECRET_ACCESS_KEY      — corresponding secret
#
# Optional GitHub Secrets:
#   SLACK_WEBHOOK_URL          — Slack incoming webhook for deploy notifications
# ============================================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test job (emergency hotfix only)'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1
  AWS_ACCOUNT_ID: '610572473486'
  ECR_REGISTRY: 610572473486.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: retailiq-api
  ECS_CLUSTER: retailiq-prod-cluster
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. TEST
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Pre-deploy Tests
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ci-test-secret-key
      FLASK_ENV: development
      PYTHONUNBUFFERED: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Create .env from example
        run: cp .env.example .env

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install pytest-xdist

      - name: Run test suite
        run: |
          pytest tests/ \
            -v \
            -n auto \
            --tb=short \
            --strict-markers

  # ──────────────────────────────────────────────────────────────────────────
  # 2. END OF WORKFLOW
  # ──────────────────────────────────────────────────────────────────────────

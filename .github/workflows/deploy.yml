# ============================================================================
# RetailIQ — Deploy to AWS ECS Fargate
# ============================================================================
# Triggers on push to main (after CI passes) or manual dispatch.
# Builds the production Docker image, pushes to ECR, and performs a
# rolling update across API, Worker, and Beat ECS services.
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID          — IAM user with ECR push + ECS deploy perms
#   AWS_SECRET_ACCESS_KEY      — corresponding secret
#   AWS_REGION                 — e.g. ap-south-1
#   AWS_ACCOUNT_ID             — 12-digit AWS account number
#   ECR_REPOSITORY             — ECR repo name (e.g. retailiq)
#   ECS_CLUSTER                — ECS cluster name
#   ECS_API_SERVICE            — service name for the API
#   ECS_WORKER_SERVICE         — service name for Celery worker
#   ECS_BEAT_SERVICE           — service name for Celery beat
#   ECS_API_TASK_DEF           — task definition family for API
#   ECS_WORKER_TASK_DEF        — task definition family for worker
#   ECS_BEAT_TASK_DEF          — task definition family for beat
#
# Optional GitHub Secrets:
#   SLACK_WEBHOOK_URL          — Slack incoming webhook for deploy notifications
# ============================================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test job (emergency hotfix only)'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false       # never cancel a running deploy

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. TEST — gate (reuses optimized CI workflow)
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Pre-deploy Tests
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ci-test-secret-key
      FLASK_ENV: development
      PYTHONUNBUFFERED: '1'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          cache-dependency-path: requirements-dev.txt
          python-version: '3.10'

      - name: Create .env from example
        run: cp .env.example .env

      - name: Install dependencies
        run: |
          uv pip install --upgrade pip
          uv pip install -r requirements-dev.txt
          uv pip install pytest-xdist

      - name: Run test suite
        run: |
          pytest tests/ \
            -v \
            -n auto  # Parallel execution
            --tb=short \
            --strict-markers

  # ──────────────────────────────────────────────────────────────────────────
  # 2. BUILD & PUSH — production Docker image
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: 🐳 Build & Push
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image: ${{ steps.build-image.outputs.image }}
      image_tag: ${{ env.IMAGE_TAG }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push image
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Output image URI
        run: |
          echo "image=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────────────────────────────────────
  # 3. DEPLOY — rolling update across ECS services
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy ${{ matrix.service.name }}
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      max-parallel: 1             # deploy API first, then worker, then beat
      matrix:
        service:
          - name: api
            task_def_secret: ECS_API_TASK_DEF
            service_secret: ECS_API_SERVICE
          - name: worker
            task_def_secret: ECS_WORKER_TASK_DEF
            service_secret: ECS_WORKER_SERVICE
          - name: beat
            task_def_secret: ECS_BEAT_TASK_DEF
            service_secret: ECS_BEAT_SERVICE

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets[matrix.service.task_def_secret] }} \
            --query taskDefinition > aws/task-definitions/${{ matrix.service.name }}.json
      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: aws/task-definitions/${{ matrix.service.name }}.json
          container-name: retailiq-${{ matrix.service.name }}
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets[matrix.service.service_secret] }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 15

  # ──────────────────────────────────────────────────────────────────────────
  # 4. POST-DEPLOY — health verification + notification
  # ──────────────────────────────────────────────────────────────────────────
  verify:
    name: ✅ Post-deploy Verify
    needs: [deploy, build]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Summarize deployment
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | \`${{ env.IMAGE_TAG }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deploy Result** | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack (success)
        if: needs.deploy.result == 'success' && env.SLACK_WEBHOOK_URL
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "✅ RetailIQ deployed to production",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *RetailIQ deployed to production*\n• Commit: `${{ github.sha }}`\n• By: ${{ github.actor }}\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack (failure)
        if: needs.deploy.result == 'failure' && env.SLACK_WEBHOOK_URL
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "🚨 RetailIQ deploy FAILED",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚨 *RetailIQ deploy FAILED*\n• Commit: `${{ github.sha }}`\n• By: ${{ github.actor }}\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

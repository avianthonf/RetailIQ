# ============================================================================
# RetailIQ — Deploy to AWS ECS Fargate
# ============================================================================
# This workflow automates the deployment to AWS ECS as documented in
# DEPLOYMENT.md. It builds the production image, pushes to ECR, and
# updates the ECS services (API, Worker, Beat).
#
# Requires GitHub Secrets:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_REGION
#   AWS_ACCOUNT_ID
# ============================================================================

name: Deploy to AWS

on:
  workflow_dispatch: # Manual trigger for AWS deployment

permissions:
  contents: read

jobs:
  deploy:
    name: 🚀 AWS ECS Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: retailiq
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f Dockerfile.prod .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Update ECS services
        run: |
          aws ecs update-service --cluster retailiq-prod --service retailiq-api --force-new-deployment
          aws ecs update-service --cluster retailiq-prod --service retailiq-worker --force-new-deployment
          aws ecs update-service --cluster retailiq-prod --service retailiq-beat --force-new-deployment

name: Complete Test Suite

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10']

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: retailiq
          POSTGRES_PASSWORD: retailiq
          POSTGRES_DB: retailiq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U retailiq"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://retailiq:retailiq@localhost:5432/retailiq_test
      CELERY_BROKER_URL: redis://localhost:6379/1
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run complete pytest suite
        env:
          PYTHONUNBUFFERED: '1'
        run: pytest -v

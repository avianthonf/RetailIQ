services:
  # 1. API Web Service
  - type: web
    name: retailiq-api
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: singapore # Closest to ap-south-1
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: retailiq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: retailiq-redis
          property: connectionString
      - key: CELERY_BROKER_URL # Explicitly required by the app
        fromService:
          type: redis
          name: retailiq-redis
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

  # 2. Celery Worker
  - type: worker
    name: retailiq-worker
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: singapore
    startCommand: celery -A celery_worker.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: retailiq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: retailiq-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: retailiq-redis
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        fromService:
          type: web
          name: retailiq-api
          property: SECRET_KEY

# Managed Postgres
databases:
  - name: retailiq-db
    databaseName: retailiq
    user: retailiq
    region: singapore
    plan: free

# Managed Redis
redis:
  - name: retailiq-redis
    region: singapore
    plan: free
    ipAllowList: [] # Only allow internal Render traffic
